networks:
  process_metrics_network:
    driver: bridge

services:
  # =============================================================================
  # PostgreSQL - Main database for all data layers
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-process_metrics}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-process_metrics}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - process_metrics_network

  # =============================================================================
  # FastAPI Admin Panel
  # =============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-process_metrics}
      DAGSTER_GRAPHQL_URL: http://dagster:3000/graphql
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - process_metrics_network

  # =============================================================================
  # Dagster - Orchestration and pipeline management
  # =============================================================================
  dagster:
    build:
      context: .
      dockerfile: Dockerfile.dagster
    container_name: dagster
    ports:
      - "3000:3000"
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-process_metrics}
      DAGSTER_POSTGRES_HOST: postgres
      DAGSTER_POSTGRES_USER: ${POSTGRES_USER:-postgres}
      DAGSTER_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DAGSTER_POSTGRES_DB: ${POSTGRES_DB:-process_metrics}
      # Jira credentials
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_USER_EMAIL: ${JIRA_USER_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
    env_file:
      - .env
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - ./pipelines:/opt/dagster/app/pipelines:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/server_info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - process_metrics_network

  # =============================================================================
  # Metabase - BI and visualization
  # =============================================================================
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${POSTGRES_DB:-process_metrics}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-postgres}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-postgres}
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - process_metrics_network

  # =============================================================================
  # Alembic - Database migrations (on-demand)
  # =============================================================================
  alembic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alembic
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-process_metrics}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - process_metrics_network
    profiles:
      - migration
    entrypoint: ["alembic", "-c", "db/migrations/alembic.ini"]

volumes:
  postgres_data:
  dagster_home:

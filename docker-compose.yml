networks:
  process_metrics_network:
    driver: bridge

services:
  postgres:
    image: postgres:15-alpine
    container_name: pmp_v2
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-process_metrics_v2}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - process_metrics_network

  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - process_metrics_network

  auth_service:
    build: ./services/auth_service
    container_name: auth_service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    networks:
      - process_metrics_network

  prefect-server:
    image: prefecthq/prefect:2.14-python3.11
    container_name: prefect-server
    command: ["prefect", "server", "start", "--host", "0.0.0.0", "--ui", "--log-level", "INFO"]
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    environment:
      PREFECT_API_URL: http://0.0.0.0:4200/api
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - process_metrics_network

  prefect-worker:
    image: prefecthq/prefect:2.14-python3.11
    container_name: prefect-worker
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_LOGGING_LEVEL: INFO
      PREFECT_WORK_POOL: ${PREFECT_WORK_POOL:-default}
      PREFECT_WORK_QUEUE: ${PREFECT_WORK_QUEUE:-default}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["prefect", "worker", "start", "--pool", "${PREFECT_WORK_POOL:-default}", "--concurrency", "2"]
    volumes:
      - prefect_data:/root/.prefect
    networks:
      - process_metrics_network

  dlt_jira_worker:
    build: ./services/dlt_jira_loader
    container_name: dlt_jira_worker
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_LOGGING_LEVEL: INFO
      PREFECT_WORK_POOL: ${PREFECT_WORK_POOL:-default}
      PREFECT_WORK_QUEUE: ${PREFECT_WORK_QUEUE:-default}
      # DLT real run can be enabled by setting to 1
      DLT_ENABLE_REAL_RUN: "0"
      # Postgres creds for DLT pipeline when enabled
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["prefect", "worker", "start", "--pool", "${PREFECT_WORK_POOL:-default}", "--concurrency", "2"]
    volumes:
      - prefect_data:/root/.prefect
    networks:
      - process_metrics_network

  # One-shot init to auto-register Prefect deployments for Jira flows
  prefect-deploy-init:
    build: ./services/dlt_jira_loader
    container_name: prefect-deploy-init
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_WORK_POOL: ${PREFECT_WORK_POOL:-default}
      PREFECT_WORK_QUEUE: ${PREFECT_WORK_QUEUE:-default}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["python", "deployments/deploy.py"]
    restart: "no"
    networks:
      - process_metrics_network

  alembic:
    image: python:3.11-slim
    container_name: alembic
    working_dir: /app
    volumes:
      - ./:/app
    env_file: .env
    environment:
      ALEMBIC_SQLALCHEMY_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - process_metrics_network
    profiles:
      - migration

volumes:
  postgres_data:
  prefect_data:

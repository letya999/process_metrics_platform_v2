networks:
  process_metrics_network:
    driver: bridge

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-process_metrics_v2}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    expose:
      - "5432"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - process_metrics_network

  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - process_metrics_network

  auth_service:
    build: ./services/auth_service
    container_name: auth_service
    # Make auth_service internal-only: expose port to compose network but do not publish to host
    expose:
      - "8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    networks:
      - process_metrics_network

  prefect-server:
    image: prefecthq/prefect:3.4.25-python3.11
    container_name: prefect-server
    command: ["prefect", "server", "start", "--host", "0.0.0.0", "--ui", "--log-level", "INFO"]
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    environment:
      # Expose API to the host UI as localhost so the browser can reach it
      PREFECT_API_URL: http://localhost:4200/api
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - process_metrics_network

  prefect-worker:
    image: prefecthq/prefect:3.4.25-python3.11
    container_name: prefect-worker
    depends_on:
      prefect-server:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_LOGGING_LEVEL: INFO
      # Ensure Python can import the service `app` package from mounted code
      PYTHONPATH: /opt/prefect/services/dlt_jira_loader
    command: ["prefect", "worker", "start", "--pool", "default"]
    volumes:
      - prefect_data:/root/.prefect
      # Mount the entire service to ensure all packages are present at runtime
      - ./services/dlt_jira_loader:/opt/prefect/services/dlt_jira_loader:ro
    networks:
      - process_metrics_network

  orchestrator:
    build: ./services/orchestrator
    container_name: orchestrator
    depends_on:
      prefect-server:
        condition: service_healthy
    restart: on-failure
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PREFECT_API_URL: http://prefect-server:4200/api
    env_file: .env
    volumes:
      - ./services/dlt_jira_loader:/opt/prefect/services/dlt_jira_loader:ro
    networks:
      - process_metrics_network
    profiles:
      - registration

  alembic:
    image: python:3.11-slim
    container_name: alembic
    working_dir: /app
    volumes:
      - ./:/app
    env_file: .env
    environment:
      ALEMBIC_SQLALCHEMY_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - process_metrics_network
    profiles:
      - migration

  tmp_runner:
    build: ./services/dlt_jira_loader
    container_name: tmp_runner
    env_file: .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./:/app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - process_metrics_network
    entrypoint: ["python", "/app/services/dlt_jira_loader/scripts/run_dlt_from_db.py"]

volumes:
  postgres_data:
  prefect_data:

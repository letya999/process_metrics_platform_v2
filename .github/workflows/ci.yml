name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check app/ pipelines/ tests/

      - name: Policy checks
        run: python scripts/check_repo_policy.py

      - name: Validate config
        run: make validate

      - name: Run focused tests
        run: |
          python -m pytest tests/unit/test_admin_auth.py tests/unit/test_api_health.py tests/integration/test_api.py -q

name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check app/ pipelines/ streamlit_admin/ bi/ scripts/ tests/

      - name: Black (check)
        run: python -m black --check app/ pipelines/ streamlit_admin/ bi/ scripts/ tests/

      - name: Policy checks
        run: python scripts/check_repo_policy.py

      - name: Smoke test gate
        run: python scripts/run_smoke_tests.py

      - name: Validate docker compose manifests
        run: make compose-validate

      - name: Unit test gate with coverage threshold
        run: |
          python -m pytest tests/unit -v --cov=app --cov=pipelines --cov-report=term-missing --cov-fail-under=70

      - name: Integration test gate
        run: python -m pytest tests/integration -v

      - name: Alembic heads gate
        run: make alembic-heads

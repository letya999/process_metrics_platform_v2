# =============================================================================
# Process Metrics Platform - Projects Configuration
# =============================================================================
# This file defines which Jira projects to sync and their connection settings.
#
# SETUP:
#   1. Copy this file to projects.yaml:
#      cp projects.example.yaml projects.yaml
#
#   2. Edit projects.yaml with your actual values
#
#   3. Set required environment variables (or use api_token directly for dev):
#      - JIRA_API_TOKEN (or custom name via api_token_env)
#      - JIRA_SECONDARY_TOKEN (if using multiple instances)
#
# ENVIRONMENT VARIABLE INTERPOLATION:
#   Use ${VAR_NAME} syntax to reference environment variables.
#   Use ${VAR_NAME:-default} for default values.
#
# =============================================================================

# -----------------------------------------------------------------------------
# Jira Instances
# -----------------------------------------------------------------------------
# Define one or more Jira instances with their connection credentials.
# Each instance has a name (key) that projects reference.

jira_instances:
  # Default Jira instance (most common case - single Jira)
  default:
    base_url: "${JIRA_BASE_URL}"
    email: "${JIRA_USER_EMAIL}"
    api_token_env: "JIRA_API_TOKEN"  # Name of env var containing token

  # Example: Secondary Jira instance (uncomment if needed)
  # secondary:
  #   base_url: "https://other-company.atlassian.net"
  #   email: "${JIRA_SECONDARY_EMAIL}"
  #   api_token_env: "JIRA_SECONDARY_TOKEN"

# -----------------------------------------------------------------------------
# Projects
# -----------------------------------------------------------------------------
# List of projects to sync. Each project references a Jira instance.

projects:
  # Example project 1
  - key: "PROJ1"
    name: "Main Project"
    jira_instance: "default"
    enabled: true
    # Optional: custom sync schedule (cron format)
    # sync_schedule: "0 6 * * *"  # Daily at 6 AM UTC
    # Optional: additional JQL filter
    # jql_filter: "status != Canceled"

  # Example project 2
  - key: "PROJ2"
    name: "Secondary Project"
    jira_instance: "default"
    enabled: true

  # Example: Disabled project (won't be synced)
  # - key: "OLD_PROJ"
  #   name: "Legacy Project"
  #   jira_instance: "default"
  #   enabled: false

  # Example: Project from different Jira instance
  # - key: "EXT1"
  #   name: "External Team Project"
  #   jira_instance: "secondary"
  #   enabled: true

# -----------------------------------------------------------------------------
# Sync Settings
# -----------------------------------------------------------------------------
# Global settings for how projects are synchronized.

sync:
  # How to sync multiple projects: "sequential" or "parallel"
  mode: "sequential"

  # Maximum parallel syncs (only applies when mode: parallel)
  max_parallel: 3

  # Automatically retry failed syncs
  retry_failed: true
  retry_count: 2

[tool.black]
line-length = 88
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 88

[tool.ruff]
line-length = 88
select = ["E", "F", "W", "C", "I"]

[build-system]
requires = ["pdm-pep517"]
build-backend = "pdm.pep517.api"

[project]
name = "process-metrics-platform"
version = "0.1.0"
description = "Self-hosted metrics collection and analytics platform"
requires-python = ">=3.11"


[dependency-groups]
dev = [
    "pre-commit>=4.3.0",
]
